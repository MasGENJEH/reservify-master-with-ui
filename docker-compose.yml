version: '3.8'

services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - '8080:8080'
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - reservify-network

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - db-volume:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - reservify-network

volumes:
  db-volume:

networks:
  reservify-network:
    driver: bridge
