<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIAKAD Suzuran - Sistem Informasi Akademik</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Prevent Flash of Unstyled Content (FOUC) for Dark Mode -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          var isDark = theme ? theme === 'dark' : true; // Default to dark as per ThemeToggle.jsx
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#0f172a'; // --monday-background dark
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.backgroundColor = '#f3f5f9'; // --monday-background light
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
